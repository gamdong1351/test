<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>근로 계산기 메인</title>
  <style>
    :root {
      --bg1: #f7fbff;
      --bg2: #eaf3ff;
      --panel: #ffffff;
      --line: #d7e1ef;
      --text: #1f2937;
      --sub: #5f6b7a;
      --primary: #0a56d6;
      --primary2: #2a89ff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      font-family: "Noto Sans KR", "Malgun Gothic", sans-serif;
      color: var(--text);
      background: linear-gradient(140deg, var(--bg1), var(--bg2));
    }

    .card {
      width: min(760px, 100%);
      background: var(--panel);
      border: 1px solid #e6edf7;
      border-radius: 18px;
      box-shadow: 0 14px 30px rgba(2, 6, 23, 0.09);
      overflow: hidden;
    }

    .head {
      padding: 24px;
      color: white;
      background: linear-gradient(120deg, var(--primary), var(--primary2));
    }

    .head h1 {
      margin: 0 0 8px;
      font-size: 1.5rem;
    }

    .head p {
      margin: 0;
      opacity: 0.95;
      line-height: 1.5;
      font-size: 0.95rem;
    }

    .content {
      padding: 22px;
      display: grid;
      gap: 14px;
    }

    .nav-btn {
      display: block;
      width: 100%;
      text-decoration: none;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 16px;
      color: var(--text);
      background: #fff;
      transition: transform 0.15s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .nav-btn:hover {
      transform: translateY(-1px);
      border-color: #b4ccf3;
      box-shadow: 0 8px 18px rgba(10, 86, 214, 0.12);
    }

    .nav-btn strong {
      display: block;
      margin-bottom: 4px;
      font-size: 1.03rem;
      color: #0a3f99;
    }

    .nav-btn span {
      color: var(--sub);
      font-size: 0.9rem;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <main class="card">
    <section class="head">
      <h1>근로 계산기 메인</h1>
      <p>아래 버튼으로 원하는 계산기로 이동하세요.</p>
    </section>
    <section class="content">
      <a class="nav-btn" href="ordinary-wage-calculator.html">
        <strong>통상임금 계산기</strong>
        <span>최근 판례 반영 통상임금/가산수당 계산</span>
      </a>
      <a class="nav-btn" href="employee-count-calculator.html">
        <strong>상시근로자수 계산기</strong>
        <span>5인/10인 기준 상시근로자수 판단</span>
      </a>
    </section>
  </main>
</body>
</html>
